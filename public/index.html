<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>nightshift</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpath d='M10 1.8 A6.6 6.6 0 1 0 14.6 8.4 A5.4 5.4 0 0 1 10 1.8 Z' fill='%23F0E2C0'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="masthead">
  <div class="brand">
    <svg class="logo" width="16" height="16" viewBox="0 0 16 16"><path d="M10 1.8 A6.6 6.6 0 1 0 14.6 8.4 A5.4 5.4 0 0 1 10 1.8 Z" fill="#F0E2C0"/></svg>
    <span class="wordmark">nightshift</span>
    <span class="crumb-sep">/</span>
    <span class="session-title" id="session-title">no session</span>
  </div>
  <div class="instruments">
    <div class="stat"><span class="stat-value adds" id="stat-add">0</span><span class="stat-label">added</span></div>
    <div class="stat"><span class="stat-value dels" id="stat-del">0</span><span class="stat-label">removed</span></div>
    <div class="stat"><span class="stat-value" id="stat-commits">0</span><span class="stat-label">commits</span></div>
    <div class="stat"><span class="stat-value" id="stat-events">0</span><span class="stat-label">events</span></div>
    <div class="stat"><span class="stat-value" id="stat-elapsed">00:00</span><span class="stat-label">elapsed</span></div>
    <div class="badge" id="status-badge"><i class="badge-dot"></i><span id="status-text">CONNECTING</span></div>
    <button class="icon-btn" id="tape-toggle" title="toggle activity tape">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="1.5" y="2.5" width="13" height="11" rx="2.5"/><line x1="10.5" y1="3" x2="10.5" y2="13"/></svg>
    </button>
  </div>
</header>

<div class="attention" id="attention" hidden>
  <i class="badge-dot"></i>
  <span class="attention-text" id="attention-text"></span>
  <span class="attention-age" id="attention-age"></span>
</div>

<main class="deck" id="deck">
  <section class="board" id="board">
    <div class="col" data-status="inbox">
      <header class="col-head">
        <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5.4" fill="none" stroke="#8a8f98" stroke-width="1.6" stroke-dasharray="2.1 2.3"/></svg>
        <h2>Inbox</h2><span class="col-count" id="count-inbox"></span>
      </header>
      <div class="cards" id="cards-inbox"></div>
      <form class="add-card" id="add-card-form">
        <input type="text" id="add-card-input" placeholder="+  Drop a card for the agent" autocomplete="off" spellcheck="false">
      </form>
    </div>
    <div class="col" data-status="doing">
      <header class="col-head">
        <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5.4" fill="none" stroke="#d29922" stroke-width="1.6"/><path d="M7 3.8 A3.2 3.2 0 0 1 7 10.2 Z" fill="#d29922"/></svg>
        <h2>In progress</h2><span class="col-count" id="count-doing"></span>
      </header>
      <div class="cards" id="cards-doing"></div>
    </div>
    <div class="col" data-status="pr">
      <header class="col-head">
        <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5.4" fill="none" stroke="#4cb782" stroke-width="1.6"/><circle cx="7" cy="7" r="2.4" fill="#4cb782"/></svg>
        <h2>PR open</h2><span class="col-count" id="count-pr"></span>
      </header>
      <div class="cards" id="cards-pr"></div>
    </div>
    <div class="col" data-status="done">
      <header class="col-head">
        <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="6.2" fill="#5e6ad2"/><path d="M4.2 7.2 L6.2 9.2 L9.8 5.2" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <h2>Done</h2><span class="col-count" id="count-done"></span>
      </header>
      <div class="cards" id="cards-done"></div>
    </div>
  </section>

  <aside class="tape" id="tape">
    <header class="col-head tape-head">
      <h2>Activity</h2><span class="col-count" id="count-feed"></span>
      <button class="icon-btn" id="tape-close" title="collapse tape">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M5 3.5 L8.5 7 L5 10.5"/></svg>
      </button>
    </header>
    <ul class="feed" id="feed"></ul>
  </aside>
</main>

<footer class="recorder">
  <div class="transport">
    <button class="t-btn" id="btn-play" title="play / pause replay">▶</button>
    <div class="speeds" id="speeds">
      <button class="speed" data-speed="1">1×</button>
      <button class="speed sel" data-speed="10">10×</button>
      <button class="speed" data-speed="60">60×</button>
    </div>
    <span class="readout" id="readout">T+00:00:00</span>
  </div>
  <canvas id="timeline"></canvas>
  <button class="t-live" id="btn-live"><i class="badge-dot"></i>LIVE</button>
</footer>

<script type="module" src="app.js"></script>
</body>
</html>
